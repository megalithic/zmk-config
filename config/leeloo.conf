# Uncomment the following line to enable the OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment if you are experiencing connectivity issues; this
# configuration item boosts the BLE transmit power.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable BLE (required for split halves to communicate)
CONFIG_ZMK_BLE=y

# Prefer USB output when connected
CONFIG_ZMK_USB=y

# Uncomment to enable deep sleep (saves battery when idle)
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# Uncomment to change the default screen saver for OLED from 30s
# CONFIG_ZMK_IDLE_TIMEOUT=30000
